<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Día 8/css/style form.css">
</head>
<body>
        <header>
        <a href="index.html" id="logo"><img src="./LOGOS/logo.png" alt=""height="90"width="75"></a>
        <div>
        <h1>Formulario</h1></div>
    </header>
    <main>
        <label>Nombre:</label>
        <input type="text" placeholder="Escribe tu nombre" required>
        <br>

        <label>Apellido:</label>
        <input type="text" placeholder="Escribe tu apellido">
        <br>

        <label>Edad:</label>
        <input type="number" min="0" max="99">
        <br>

        <label>Acepto términos:</label>
        <input type="checkbox" name="terms" checked>
        <br>

        <label>Fecha de Nacimiento:</label>
        <input type="date">
        <br>

        <label for="género">Selecciona tu género:</label>
        <br>
        <input type="radio" id="masculino" name="género" value="masculino">
        <label for="masculino">Masculino</label>
        <br>
        <input type="radio" id="femenino" name="género" value="femenino">
        <label for="femenino">Femenino</label>
        <br>
        <input type="radio" id="otro" name="género" value="otro">
        <label for="otro">Otro</label>
        <br>
        <button type="submit">Enviar Datos</button>
        <br>
    </main>
    <footer>
        <h3>CONTACTOS:</h3>
        <a href="https://www.instagram.com/politecnicomodelo/?hl=es-la"> <img src="./LOGOS/Instagram_logo_2016.svg.png" alt="" width="30" height="30"></a>
        <a href="https://www.facebook.com/politecnicomodelo/"><img src="./LOGOS/2021_Facebook_icon.svg.png" alt="" width="30" height="30"></a>
    </footer>
</body>
</html>
